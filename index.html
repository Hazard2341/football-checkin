<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>龙港新势力 · 足球训练打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;padding-bottom:30px;position:relative;overflow-x:hidden;
  background:linear-gradient(135deg,#0a1628,#1a2a4a,#0d1f3c);
  color:#fff
}
body::before{content:'';position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 50% 0%, #1b4a2e 0%, #0d1f3c 60%, #0a1628 100%)}
body::after{content:'';position:fixed;inset:0;z-index:-1;background:repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(255,255,255,0.03) 50px,rgba(255,255,255,0.03) 51px),repeating-linear-gradient(0deg,transparent,transparent 50px,rgba(255,255,255,0.02) 50px,rgba(255,255,255,0.02) 51px)}
.bg-ball{position:fixed;z-index:-1;pointer-events:none;user-select:none;opacity:0.08}
.bg-ball:nth-child(1){top:5%;left:3%;font-size:90px;animation:bgFloat 18s ease-in-out infinite}
.bg-ball:nth-child(2){top:40%;right:5%;font-size:60px;animation:bgFloat 22s ease-in-out infinite -6s}
.bg-ball:nth-child(3){bottom:15%;left:10%;font-size:75px;animation:bgFloat 20s ease-in-out infinite -12s}
.bg-ball:nth-child(4){bottom:5%;right:8%;font-size:50px;animation:bgFloat 16s ease-in-out infinite -4s}
@keyframes bgFloat{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-20px) rotate(12deg)}66%{transform:translateY(12px) rotate(-6deg)}}
.header{background:linear-gradient(135deg,#1a237ee6,#0d1453e6);backdrop-filter:blur(12px);padding:18px 16px 10px;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(255,255,255,0.08)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(90deg,#fff,#90caf9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.streak{background:linear-gradient(135deg,#ff6b35,#ff8f65);padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(255,107,53,0.3)}
.date-display{font-size:13px;opacity:0.7;margin-top:4px}
.header-actions{display:flex;gap:6px;margin-top:6px}
.action-btn{padding:4px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.15s}
.action-btn:active{transform:scale(0.95)}
.user-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);padding:3px 12px 3px 8px;border-radius:20px;font-size:12px;cursor:pointer}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#1565c0,#1976d2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.pos-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:rgba(255,255,255,0.06);-webkit-overflow-scrolling:touch;justify-content:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.pos-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.75);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;white-space:nowrap}
.pos-btn.active{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(21,101,192,0.4)}
.day-bar{display:flex;gap:5px;padding:12px 14px;overflow-x:auto;background:linear-gradient(180deg,rgba(26,35,126,0.4),rgba(40,53,147,0.2));-webkit-overflow-scrolling:touch}
.day-btn{flex:1;min-width:44px;padding:10px 3px;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);cursor:pointer;text-align:center;font-size:15px;font-weight:700;transition:all 0.2s}
.day-btn.active{background:#fff;color:#1a237e;border-color:#fff;box-shadow:0 2px 12px rgba(255,255,255,0.2)}
.day-btn.today{border-color:#ff6b35;background:rgba(255,107,53,0.18);color:#ff6b35;font-size:17px;box-shadow:0 0 12px rgba(255,107,53,0.15)}
.day-btn.checked{color:#4ade80;border-color:#4ade80;background:rgba(74,222,128,0.12)}
.day-btn.rest{color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.05);cursor:default}
.day-tag{font-size:9px;display:block;margin-top:2px;opacity:0.6;font-weight:400}
.day-tag.upper{color:#f59e0b}
.day-tag.lower{color:#3b82f6}
.day-tag.football{color:#4ade80}
.day-tag.restday{color:rgba(255,255,255,0.3)}
.container{max-width:480px;margin:0 auto;padding:10px 12px}
.glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;border:1px solid rgba(255,255,255,0.08);margin-bottom:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.card-type{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700}
.card-type.upper{background:rgba(245,158,11,0.2);color:#f59e0b}
.card-type.lower{background:rgba(59,130,246,0.2);color:#3b82f6}
.card-type.football{background:rgba(74,222,128,0.2);color:#4ade80}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-item{background:rgba(255,255,255,0.07);backdrop-filter:blur(12px);border-radius:14px;padding:14px 8px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.stat-num{font-size:26px;font-weight:800;background:linear-gradient(135deg,#fff,#90caf9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px}
.stat-icon{font-size:18px;margin-bottom:4px}
.weekly-progress{padding:14px 16px}
.weekly-progress h3{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between}
.weekly-progress h3 span{color:rgba(255,255,255,0.5);font-weight:400}
.pbar{height:8px;background:rgba(255,255,255,0.1);border-radius:8px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#4ade80,#22d3ee);border-radius:8px;transition:width 0.6s ease}
.plan-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.plan-header.upper-bg{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.05))}
.plan-header.lower-bg{background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(59,130,246,0.05))}
.plan-header.football-bg{background:linear-gradient(135deg,rgba(74,222,128,0.2),rgba(74,222,128,0.05))}
.plan-header.rest-bg{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02))}
.plan-title{font-size:16px;font-weight:700}
.plan-dur{font-size:12px;background:rgba(255,255,255,0.08);padding:3px 10px;border-radius:12px;color:rgba(255,255,255,0.7)}
.plan-note{padding:8px 16px;font-size:12px;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.04);line-height:1.5}
.exercise{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.04)}
.exercise:active{background:rgba(255,255,255,0.06)}
.exercise.done{opacity:0.4}
.exercise.done .ex-name{text-decoration:line-through;color:rgba(255,255,255,0.3)}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all 0.3s;color:transparent}
.exercise.done .check-circle{background:linear-gradient(135deg,#4ade80,#22d3ee);border-color:transparent;color:#fff;font-size:14px}
.ex-info{flex:1;min-width:0}
.ex-name{font-weight:600;font-size:14px}
.ex-detail{font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px}
.ex-num{font-weight:700;font-size:14px;color:rgba(100,180,255,0.5);background:rgba(100,180,255,0.08);padding:4px 10px;border-radius:8px;flex-shrink:0}
.checkin-btn{display:block;width:calc(100% - 32px);margin:16px auto;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff6b35,#ff8f65);color:#fff;font-size:17px;font-weight:800;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,107,53,0.3)}
.checkin-btn:active{transform:scale(0.97)}
.checkin-btn.rest{background:linear-gradient(135deg,#4ade80,#22d3ee);box-shadow:0 4px 20px rgba(74,222,128,0.3)}
.login-overlay{position:fixed;inset:0;z-index:500;background:linear-gradient(135deg,#0a1628,#1a2a4a);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:24px;border:1px solid rgba(255,255,255,0.1);padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.login-card h2{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(90deg,#fff,#90caf9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .sub{text-align:center;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:#fff;font-size:15px;outline:none;margin-bottom:12px}
.login-card input:focus{border-color:#1565c0}
.login-card .btn-primary{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.login-card .btn-ghost{width:100%;padding:10px;border:none;border-radius:12px;background:transparent;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;margin-top:8px}
.login-card .error{font-size:13px;color:#ff6b35;margin-bottom:10px;display:none}
.login-card .divider{text-align:center;font-size:12px;color:rgba(255,255,255,0.3);margin:16px 0}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;padding:20px}
.overlay.show{display:flex}
.tut-modal{background:rgba(30,40,70,0.95);backdrop-filter:blur(20px);border-radius:20px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto;padding:20px;border:1px solid rgba(255,255,255,0.08);animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.tut-title{font-size:18px;font-weight:700;margin-bottom:12px}
.tut-section h4{font-size:14px;font-weight:600;margin-bottom:6px;color:#4ade80}
.tut-section h4.warn{color:#ff6b35}
.tut-section ul{padding-left:18px;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.8}
.tut-tips{font-size:13px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.05);padding:10px 14px;border-radius:10px}
.tut-actions{display:flex;gap:10px;margin-top:16px}
.tut-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.tut-actions .btn-done{background:linear-gradient(135deg,#4ade80,#22d3ee);color:#0a1628}
.tut-actions .btn-close{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}
@keyframes pop{0%{transform:scale(0) rotate(-15deg);opacity:0}50%{transform:scale(1.3) rotate(8deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.6)}}
.floating-emoji{position:fixed;font-size:60px;z-index:300;pointer-events:none;animation:pop 0.35s ease forwards,floatUp 1s ease 0.35s forwards}
.week-grid{display:flex;gap:4px;margin-top:8px}
.wday{flex:1;text-align:center;padding:5px 2px;border-radius:6px;background:rgba(255,255,255,0.05);font-size:11px;color:rgba(255,255,255,0.4)}
.wday.done{background:rgba(74,222,128,0.15);color:#4ade80;font-weight:600}
.wday.t{color:rgba(255,255,255,0.6)}
.empty-state{padding:30px 16px;text-align:center}
.empty-state .big{font-size:40px;margin-bottom:8px}
.empty-state .txt{font-size:14px;color:rgba(255,255,255,0.4)}
.notification{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:400;background:rgba(30,40,70,0.95);backdrop-filter:blur(12px);padding:12px 24px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);font-size:14px;font-weight:600;color:#4ade80;animation:notifIn 0.3s ease;pointer-events:none}
@keyframes notifIn{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1628">
</head>
<body>
<div class="bg-ball">⚽</div>
<div class="bg-ball">🏋️</div>
<div class="bg-ball">⚽</div>
<div class="bg-ball">💪</div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>⚽ 龙港新势力</h2>
    <div class="sub">足球训练打卡 · 云端同步</div>
    <div class="error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="密码 (6位以上)">
    <button class="btn-primary" id="loginBtn" onclick="login()">登录 / 注册</button>
    <div class="divider">注册后自动登录，数据云端同步</div>
    <button class="btn-ghost" onclick="skipLogin()">先看看 👀</button>
  </div>
</div>

<div class="header" id="appHeader" style="display:none">
  <div class="header-top">
    <h1>⚽ 龙港新势力</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-badge" id="userBadge" onclick="logout()">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">用户</span>
      </div>
      <div class="streak" id="streakBadge">0天</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="action-btn" onclick="exportData()">📤 导出</button>
    <button class="action-btn" onclick="document.getElementById('importInput').click()">📥 导入</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div class="date-display" id="dateDisplay"></div>
  <div class="week-grid" id="weekGrid"></div>
</div>

<div class="pos-bar" id="posBar" style="display:none"></div>
<div class="day-bar" id="dayBar" style="display:none"></div>

<div class="container" id="mainContent" style="display:none">
  <div class="stats-row" id="statsRow"></div>
  <div class="glass weekly-progress">
    <h3>本周进度 <span id="weekProgressText">0/5 天</span></h3>
    <div class="pbar"><div class="pfill" id="weeklyBar" style="width:0%"></div></div>
  </div>
  <div class="glass">
    <div class="plan-header" id="planHeader">
      <div><span class="card-type" id="planType">💪 上半身</span><span class="plan-title" id="planTitle" style="margin-left:8px">训练计划</span></div>
      <div class="plan-dur" id="planDur"></div>
    </div>
    <div class="plan-note" id="planNote"></div>
    <div id="exerciseList"></div>
    <button class="checkin-btn hidden" id="checkinBtn" onclick="doCheckin()">完成今日打卡</button>
  </div>
</div>

<div class="overlay" id="tutOverlay" onclick="if(event.target===this)closeTut()">
  <div class="tut-modal">
    <div class="tut-title" id="tutTitle">动作名称</div>
    <div class="tut-section">
      <h4>✅ 正确步骤</h4>
      <ul id="tutSteps"></ul>
    </div>
    <div class="tut-section">
      <h4 class="warn">⚠️ 常见错误</h4>
      <ul id="tutMistakes"></ul>
    </div>
    <div class="tut-section">
      <div class="tut-tips" id="tutTips"></div>
    </div>
    <div class="tut-actions">
      <button class="btn-done" onclick="markDone()">✅ 已完成</button>
      <button class="btn-close" onclick="closeTut()">关闭</button>
    </div>
  </div>
</div>
