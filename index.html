<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>龙港新势力 · 足球训练打卡</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* Login page */
.login-overlay{position:fixed;inset:0;z-index:500;background:linear-gradient(135deg,#0a1628,#1a2a4a);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:24px;border:1px solid rgba(255,255,255,0.1);padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.login-card h2{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(90deg,#fff,#90caf9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .sub{text-align:center;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:#fff;font-size:15px;outline:none;transition:border 0.2s;margin-bottom:12px}
.login-card input:focus{border-color:#1565c0}
.login-card input::placeholder{color:rgba(255,255,255,0.3)}
.login-card .btn-primary{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:4px}
.login-card .btn-primary:active{transform:scale(0.97)}
.login-card .btn-ghost{width:100%;padding:10px;border:none;border-radius:12px;background:transparent;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;margin-top:8px}
.login-card .btn-ghost:hover{color:rgba(255,255,255,0.9)}
.login-card .error{font-size:13px;color:#ff6b35;margin-bottom:10px;display:none}
.login-card .divider{text-align:center;font-size:12px;color:rgba(255,255,255,0.3);margin:16px 0}
.user-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);padding:3px 12px 3px 8px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.15s}
.user-badge:active{background:rgba(255,255,255,0.15)}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#1565c0,#1976d2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.notification{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:400;background:rgba(30,40,70,0.95);backdrop-filter:blur(12px);padding:12px 24px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);font-size:14px;font-weight:600;color:#4ade80;animation:notifIn 0.3s ease;pointer-events:none}
@keyframes notifIn{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1628">
</head>
<body>
<div class="bg-ball">⚽</div>
<div class="bg-ball">🏋️</div>
<div class="bg-ball">⚽</div>
<div class="bg-ball">💪</div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>⚽ 龙港新势力</h2>
    <div class="sub">足球训练打卡 · 云端同步</div>
    <div class="error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="密码 (6位以上)" autocomplete="current-password">
    <button class="btn-primary" id="loginBtn" onclick="login()">登录 / 注册</button>
    <div class="divider">注册后自动登录，数据云端同步</div>
    <button class="btn-ghost" onclick="skipLogin()">先看看 🌟</button>
  </div>
</div>

<div class="header" id="appHeader" style="display:none">
  <div class="header-top">
    <h1>⚽ 龙港新势力</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-badge" id="userBadge" onclick="logout()">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">用户</span>
      </div>
      <div class="streak" id="streakBadge">0天</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="action-btn" onclick="exportData()">🗑️ 导出</button>
    <button class="action-btn" onclick="document.getElementById('importInput').click()">📌 导入</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div class="date-display" id="dateDisplay"></div>
  <div class="week-grid" id="weekGrid"></div>
</div>

<div class="pos-bar" id="posBar" style="display:none"></div>
<div class="day-bar" id="dayBar" style="display:none"></div>

<div class="container" id="mainContent" style="display:none">
  <div class="stats-row" id="statsRow"></div>
  <div class="glass weekly-progress">
    <h3>本周进度 <span id="weekProgressText">0/5 天</span></h3>
    <div class="pbar"><div class="pfill" id="weeklyBar" style="width:0%"></div></div>
  </div>
  <div class="glass">
    <div class="plan-header" id="planHeader">
      <div><span class="card-type" id="planType">💪 上半身</span><span class="plan-title" id="planTitle" style="margin-left:8px">训练计划</span></div>
      <div class="plan-dur" id="planDur"></div>
    </div>
    <div class="plan-note" id="planNote"></div>
    <div id="exerciseList"></div>
    <button class="checkin-btn hidden" id="checkinBtn" onclick="doCheckin()">完成今日打卡</button>
  </div>
</div>

<div class="overlay" id="tutOverlay" onclick="if(event.target===this)closeTut()">
  <div class="tut-modal">
    <div class="tut-title" id="tutTitle">动作名称</div>
    <div class="tut-section">
      <h4>✅ 正确步骤</h4>
      <ul id="tutSteps"></ul>
    </div>
    <div class="tut-section">
      <h4 class="warn">👍 常见错误</h4>
      <ul id="tutMistakes"></ul>
    </div>
    <div class="tut-section">
      <div class="tut-tips" id="tutTips"></div>
    </div>
    <div class="tut-actions">
      <button class="btn-done" onclick="markDone()">✅ 已完成</button>
      <button class="btn-close" onclick="closeTut()">关闭</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://rspilvkxtopjlfjphszg.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcGlsdmt4dG9wamxmanBoc3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIxNjk3NzAsImV4cCI6MjA2Nzc0NTc3MH0.3nA1gARc5iEltXgbgQkIXx4a7y5MUTjByNQ_1YpI4kI';
var _supabase = null;
var _currentUser = null;
var _syncing = false;

function getSupabase() {
  if (_supabase) return _supabase;
  try {
    _supabase = window.supabase.createClient(
      "https://rspilvkxtopjlfjphszg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcGlsdmt4dG9wamxmanBoc3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIxNjk3NzAsImV4cCI6MjA2Nzc0NTc3MH0.3nA1gARc5iEltXgbgQkIXx4a7y5MUTjByNQ_1YpI4kI"
    );
    return _supabase;
  } catch(e) { console.warn("Supabase error:", e); return null; }
}

function getPlan(d){var p=PLANS[curPosKey];return p&&p[String(d)]?p[String(d)]:null}
function getTip(name){for(var k in TIPS){if(name.indexOf(k)>=0)return TIPS[k]}return null}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function getLocalData(){try{return JSON.parse(localStorage.getItem('data'))||{}}catch(e){return{}}}
function saveLocalData(d){localStorage.setItem('data',JSON.stringify(d))}

async function loadCloudData() {
  var sb = getSupabase(); if(!sb) return null;
  try {
    var {data,error} = await sb.from('checkins').select('data').eq('id', _currentUser.id).single();
    if(error && error.code != 'PGRST116') { console.warn('Cloud:',error.message); return null }
    return data && data.data ? data.data : null;
  } catch(e) { return null }
}

async function saveCloudData(dataObj) {
  if(_syncing) return;
  _syncing = true;
  var sb = getSupabase(); if(!sb){_syncing=false;return}
  try {
    await sb.from('checkins').upsert({id:_currentUser.id, data:dataObj, updated_at:new Date().toISOString()}, {onConflict:'id'});
  } catch(e) {}
  _syncing = false;
}

function getData() {
  var local = getLocalData();
  if(_currentUser && _currentUser.cloudData) {
    var merged = {};
    for(var k in _currentUser.cloudData) merged[k] = _currentUser.cloudData[k];
    for(var k in local) if(!merged[k]) merged[k] = local[k];
    return merged;
  }
  return local;
}

function saveData(d) {
  saveLocalData(d);
  if(_currentUser) saveCloudData(d);
}

async function login() {
  var email=document.getElementById('loginEmail').value.trim();
  var pw=document.getElementById('loginPassword').value.trim();
  var errEl=document.getElementById('loginError');
  if(!email||!pw){errEl.style.display='block';errEl.innerText='请填写邮箱和密码';return}
  if(pw.length<6){errEl.style.display='block';errEl.innerText='密码至少6位';return}
  var sb=getSupabase();
  if(!sb){errEl.style.display='block';errEl.innerText='请配置 Supabase';return}
  errEl.style.display='none';
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').innerText='正在登录...';
  try {
    var {data,error} = await sb.auth.signInWithPassword({email,pw});
    if(error) {
      if(error.message.includes('Invalid login credentials')) {
        var {data:regData,error:regError} = await sb.auth.signUp({email,password:pw});
        if(regError) throw regError;
        data = regData;
      } else throw error;
    }
    _currentUser = {id:data.user.id, email:data.user.email};
    var cloudData = await loadCloudData();
    if(cloudData) {
      _currentUser.cloudData = cloudData;
      var merged = {};
      for(var k in cloudData) merged[k] = cloudData[k];
      var local = getLocalData();
      for(var k in local) if(!merged[k]) merged[k] = local[k];
      saveLocalData(merged);
    } else {
      var local = getLocalData();
      if(Object.keys(local).length > 0) await saveCloudData(local);
      _currentUser.cloudData = local;
    }
    showApp();
  } catch(e) {
    errEl.style.display='block';errEl.innerText=e.message||'网络错误';
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').innerText='登录 / 注册';
  }
}

function skipLogin() { showApp(); }

async function logout() {
  if(confirm('确定要退出登录吗？')) {
    var sb=getSupabase();
    if(sb) await sb.auth.signOut();
    _currentUser=null;
    location.reload();
  }
}

function showApp() {
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appHeader').style.display='block';
  document.getElementById('posBar').style.display='flex';
  document.getElementById('dayBar').style.display='flex';
  document.getElementById('mainContent').style.display='block';
  if(_currentUser) {
    var name = _currentUser.email.split('@')[0];
    document.getElementById('userName').innerText = name;
    document.getElementById('userAvatar').innerText = name.charAt(0).toUpperCase();
  } else {
    document.getElementById('userName').innerText = '游客';
    document.getElementById('userAvatar').innerText = '?';
  }
  render();
}

function exportData() {
  var data=getData();
  if(Object.keys(data).length===0){showNotif('暂无打卡数据');return}
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='足球打卡_数据_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
  showNotif('数据已导出');
}

function importData(e) {
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var imported=JSON.parse(ev.target.result);
      if(typeof imported!=='object'||imported===null){showNotif('文件格式错误');return}
      var data=getData();
      var count=0;
      for(var k in imported){if(!data[k]){data[k]=imported[k];count++}}
      saveData(data);
      render();
      showNotif('成功导入 '+count+' 条记录');
    }catch(e){showNotif('文件解析失败')}
  };
  reader.readAsText(file);
  e.target.value='';
}

function showNotif(msg) {
  var old=document.querySelector('.notification');if(old)old.remove();
  var n=document.createElement('div');n.className='notification';n.innerText=msg;
  document.body.appendChild(n);
  setTimeout(function(){n.style.opacity='0';n.style.transition='opacity 0.3s';setTimeout(function(){n.remove()},300)},2000)
}

function render() {
  var now=new Date(),tk=todayKey();
  document.getElementById('dateDisplay').innerText=now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  var ph='',pl=['边后卫','中后卫','中场','前锋','守门员'],pi=['🛡️','🧱','🎯','⚡','🧤'];
  for(var i=0;i<pl.length;i++){var ic=pi[i];var ac=pl[i]===curPosKey?'active':'';ph+='<button class="pos-btn '+ac+'" data-pos="'+pl[i]+'">'+ic+' '+pl[i]+'</button>'}
  document.getElementById('posBar').innerHTML=ph;
  var dh='';
  for(var i=0;i<7;i++){
    var cls='day-btn';
    if(i===now.getDay())cls+=' today';
    if(i===selDay&&i!==now.getDay())cls+=' active';
    if(i===0||i===6)cls+=' rest';
    var tag='',tc='day-tag';
    if(i===0||i==6){tag='休';tc+=' restday'}else if(i==1||i==4){tag='上身';tc+=' upper'}else if(i==2||i==5){tag='下身';tc+=' lower'}else if(i==3){tag='足球';tc+=' football'}
    dh+='<div class="'+cls+'" onclick="selDayClick('+i+')">'+DAYS[i]+'<span class="'+tc+'">'+tag+'</span></div>';
  }
  document.getElementById('dayBar').innerHTML=dh;
  var data=getData(),keys=Object.keys(data);
  document.getElementById('streakBadge').innerText=keys.length+'天';
  var streakCount=0,sk=Object.keys(data).sort().reverse();
  for(var i=0;i<sk.length;i++){var cd=new Date();cd.setDate(cd.getDate()-i);var ck=cd.getFullYear()+'-'+(cd.getMonth()+1)+'-'+cd.getDate();if(data[ck])streakCount++;else break}
  document.getElementById('statsRow').innerHTML='<div class="stat-item"><div class="stat-icon">🔥</div><div class="stat-num">'+streakCount+'</div><div class="stat-label">连续打卡</div></div><div class="stat-item"><div class="stat-icon">📅</div><div class="stat-num">'+keys.length+'</div><div class="stat-label">总天数</div></div><div class="stat-item"><div class="stat-icon">⭐</div><div class="stat-num">'+now.getDate()+'</div><div class="stat-label">'+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]+'</div></div>';
  var wg='';
  for(var i=0;i<7;i++){var wd=new Date(now);wd.setDate(now.getDate()-now.getDay()+i);var wk=wd.getFullYear()+'-'+(wd.getMonth()+1)+'-'+wd.getDate(),wcls='wday'+(data[wk]?' done':'')+(wd.toDateString()===now.toDateString()?' t':'');wg+='<div class="'+wcls+'">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][wd.getDay()]+'</div>'}
  document.getElementById('weekGrid').innerHTML=wg;
  var weekDone=0;
  for(var i=1;i<=5;i++){var wd=new Date(now);wd.setDate(now.getDate()-now.getDay()+i);var wk=wd.getFullYear()+'-'+(wd.getMonth()+1)+'-'+wd.getDate();if(data[wk])weekDone++}
  document.getElementById('weeklyBar').style.width=Math.round(weekDone/5*100)+'%';
  document.getElementById('weekProgressText').innerText=weekDone+'/5 天';
  var plan=getPlan(selDay),list=document.getElementById('exerciseList'),title=document.getElementById('planTitle'),dur=document.getElementById('planDur'),note=document.getElementById('planNote'),ptype=document.getElementById('planType'),pheader=document.getElementById('planHeader'),btn=document.getElementById('checkinBtn');
  if(!plan||selDay===0||selDay===6){
    pheader.className='plan-header rest-bg';ptype.className='card-type';
    ptype.innerText='休息日';title.innerText='';dur.innerText='';
    note.innerText='好好休息，恢复体能';
    list.innerHTML='<div class="empty-state"><div class="big">🛋️</div><div class="txt">今天休息，让身体充分恢复</div></div>';
    if(selDay===now.getDay()&&!data[tk]){btn.className='checkin-btn rest';btn.innerText='完成休息';btn.style.display='block'}
    else{btn.style.display='none'}
    return;
  }
  pheader.className='plan-header '+(selDay===1||selDay===4?'upper-bg':selDay===2||selDay===5?'lower-bg':'football-bg');
  ptype.className='card-type '+(selDay===1||selDay===4?'upper':selDay===2||selDay===5?'lower':'football');
  ptype.innerText=selDay===1||selDay===4?'上半身力量':selDay===2||selDay===5?'下半身力量':'足球专项';
  title.innerText=plan.t+' - '+curPosKey;
  dur.innerText=plan.d;
  note.innerText=plan.n;
  var td=new Date(now);td.setDate(now.getDate()-now.getDay()+selDay);
  var tk2=td.getFullYear()+'-'+(td.getMonth()+1)+'-'+td.getDate();
  var checked=!!data[tk2];
  if(checked){list.innerHTML=plan.e.map(function(ex,i){return'<div class="exercise done"><div class="check-circle">✅</div><div class="ex-info"><div class="ex-name">'+ex[0]+'</div><div class="ex-detail">'+ex[1]+'</div></div></div>'}).join('');btn.style.display='none';return}
  list.innerHTML=plan.e.map(function(ex,i){return'<div class="exercise" data-idx="'+i+'" data-name="'+ex[0]+'" data-detail="'+ex[1]+'"><div class="check-circle" id="chk'+i+'"></div><div class="ex-info"><div class="ex-name">'+ex[0]+'</div><div class="ex-detail">'+ex[1]+'</div></div><div class="ex-num">'+(i+1)+'</div></div>'}).join('');
  btn.style.display='block';btn.className='checkin-btn';btn.innerText='完成今日打卡';
}

var _clickedEx=null;
function selDayClick(d){selDay=d;render();}
function selPos(p){curPosKey=p;localStorage.setItem('posKey',p);render();}
var EMOS=['🎉','🔥','💪','⭐','🌟','🏆','✨','😎'];
function showEmoji(extra){var list=extra?[extra].concat(EMOS):EMOS;for(var i=0;i<5;i++){var e=document.createElement('div');e.className='floating-emoji';e.innerText=list[Math.floor(Math.random()*list.length)];e.style.left=(10+Math.random()*80)+'vw';e.style.top=(20+Math.random()*40)+'vh';document.body.appendChild(e);setTimeout(function(){e.remove()},1500)}}
async function doCheckin(){var now=new Date(),key=todayKey(),data=getData();data[key]={date:key,day:now.getDay(),at:new Date().toISOString()};saveData(data);if(_currentUser) saveCloudData(data);showEmoji();render()}
document.getElementById('posBar').addEventListener('click',function(e){var b=e.target.closest('.pos-btn');if(b&&b.dataset.pos){selPos(b.dataset.pos);return}});
document.getElementById('exerciseList').addEventListener('click',function(e){
  var item=e.target.closest('.exercise');if(!item||item.classList.contains('done'))return;
  var name=item.getAttribute('data-name')||'',tip=getTip(name),o=document.getElementById('tutOverlay');
  document.getElementById('tutTitle').innerText=name;
  if(tip){document.getElementById('tutSteps').innerHTML=tip.s.map(function(s){return'<li>'+s+'</li>'}).join('');document.getElementById('tutMistakes').innerHTML=tip.m.map(function(m){return'<li>'+m+'</li>'}).join('');document.getElementById('tutTips').innerText=tip.t}
  else{document.getElementById('tutSteps').innerHTML='<li>保持正确姿势</li><li>控制动作速度</li>';document.getElementById('tutMistakes').innerHTML='<li>不要借用惯性</li>';document.getElementById('tutTips').innerText='质量优先于数量。循序渐进增加负荷。'}
  _clickedEx=item;o.classList.add('show');
});
function markDone(){if(_clickedEx){_clickedEx.classList.add('done');var ck=_clickedEx.querySelector('.check-circle');if(ck)ck.innerText='✅';showEmoji('✅')}closeTut()}
function closeTut(){document.getElementById('tutOverlay').classList.remove('show');_clickedEx=null}

window.onload = function() {
  var sb = getSupabase();
  if(sb) {
    sb.auth.getSession().then(function(resp) {
      if(resp.data && resp.data.session) {
        _currentUser = {id:resp.data.session.user.id, email:resp.data.session.user.email};
        loadCloudData().then(function(cd){ if(cd) _currentUser.cloudData = cd; showApp(); });
      }
    });
  }
};
</script>
</body>
</html>
