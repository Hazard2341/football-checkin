<script>
var SUPABASE_URL = "https://zskhfoognaolccysvkgc.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_n2DUeMtq6tmvygpAwqOY5w_ZHUwMBnC";
var _supabase = null;
var _currentUser = null;
var _syncing = false;
var selDay = new Date().getDay();
var curPosKey = localStorage.getItem("posKey") || "边后卫";
var _clickedEx = null;





var EMOS = ["🎉","🔥","💪","⭐","🌟","🏆","✨","😎"];
var DAYS = ["日","一","二","三","四","五","六"];

// ===== Supabase helpers (defined first, before login) =====
function getSupabase() {
  if (_supabase) return _supabase;
  _supabase = {
    url: SUPABASE_URL,
    key: SUPABASE_ANON_KEY,
    headers: function() {
      var h = {"apikey": this.key, "Content-Type": "application/json"};
      if (_currentUser && _currentUser.token) h["Authorization"] = "Bearer " + _currentUser.token;
      return h;
    }
  };
  return _supabase;
}

async function supabaseSignIn(email, password) {
  var sb = getSupabase();
  if (!sb) return {error: {message: "No Supabase config"}};
  try {
    var resp = await fetch(sb.url + "/auth/v1/token?grant_type=password", {
      method: "POST",
      headers: {"apikey": sb.key, "Content-Type": "application/json"},
      body: JSON.stringify({email: email, password: password})
    });
    var data = await resp.json();
    if (data.access_token) {
      _currentUser = {id: data.user.id, email: data.user.email, token: data.access_token};
      localStorage.setItem("sb_user", JSON.stringify(_currentUser));
      return {data: data, error: null};
    }
    var resp2 = await fetch(sb.url + "/auth/v1/signup", {
      method: "POST",
      headers: {"apikey": sb.key, "Content-Type": "application/json"},
      body: JSON.stringify({email: email, password: password})
    });
    var data2 = await resp2.json();
    if (data2.id) {
      _currentUser = {id: data2.id, email: email, token: null};
      localStorage.setItem("sb_user", JSON.stringify(_currentUser));
      return {data: data2, error: null};
    }
    return {data: null, error: data2};
  } catch(e) {
    return {error: {message: e.message}};
  }
}

async function loadCloudData() {
  var sb = getSupabase(); if (!sb || !_currentUser) return null;
  try {
    var resp = await fetch(sb.url + "/rest/v1/checkins?id=eq." + _currentUser.id, {headers: sb.headers()});
    var d = await resp.json();
    return d && d[0] && d[0].data ? d[0].data : null;
  } catch(e) { return null; }
}

async function saveCloudData(dataObj) {
  if (_syncing) return;
  _syncing = true;
  var sb = getSupabase(); if (!sb || !_currentUser) { _syncing = false; return; }
  try {
    await fetch(sb.url + "/rest/v1/checkins", {
      method: "POST",
      headers: sb.headers(),
      body: JSON.stringify({id: _currentUser.id, data: dataObj, updated_at: new Date().toISOString()})
    });
  } catch(e) {}
  _syncing = false;
}

function getPlan(d) { var p = PLANS[curPosKey]; return p && p[String(d)] ? p[String(d)] : null; }
function getTip(name) { for(var k in TIPS) { if(name.indexOf(k) >= 0) return TIPS[k]; } return null; }
function todayKey() { var d = new Date(); return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); }
function getLocalData() { try { return JSON.parse(localStorage.getItem("data")) || {}; } catch(e) { return {}; } }
function saveLocalData(d) { localStorage.setItem("data", JSON.stringify(d)); }

function getData() {
  var local = getLocalData();
  if (_currentUser && _currentUser.cloudData) {
    var merged = {};
    for(var k in _currentUser.cloudData) merged[k] = _currentUser.cloudData[k];
    for(var k in local) if(!merged[k]) merged[k] = local[k];
    return merged;
  }
  return local;
}

function saveData(d) {
  saveLocalData(d);
  if (_currentUser) saveCloudData(d);
}

// ===== Auth =====
async function login() {
  var email = document.getElementById("loginEmail").value.trim();
  var pw = document.getElementById("loginPassword").value.trim();
  var errEl = document.getElementById("loginError");
  if (!email || !pw) { errEl.style.display = "block"; errEl.innerText = "请填写邮箱和密码"; return; }
  if (pw.length < 6) { errEl.style.display = "block"; errEl.innerText = "密码至少6位"; return; }
  errEl.style.display = "none";
  document.getElementById("loginBtn").disabled = true;
  document.getElementById("loginBtn").innerText = "正在登录...";
  try {
    var result = await supabaseSignIn(email, pw);
    if (result.error) {
      errEl.style.display = "block"; errEl.innerText = result.error.message || "登录失败";
      document.getElementById("loginBtn").disabled = false;
      document.getElementById("loginBtn").innerText = "登录 / 注册";
      return;
    }
    var cloudData = await loadCloudData();
    if (cloudData) {
      _currentUser.cloudData = cloudData;
      var merged = {};
      for(var k in cloudData) merged[k] = cloudData[k];
      var local = getLocalData();
      for(var k in local) if(!merged[k]) merged[k] = local[k];
      saveLocalData(merged);
    } else {
      var local = getLocalData();
      if (Object.keys(local).length > 0) await saveCloudData(local);
      _currentUser.cloudData = local;
    }
    showApp();
  } catch(e) {
    errEl.style.display = "block"; errEl.innerText = "网络错误";
    document.getElementById("loginBtn").disabled = false;
    document.getElementById("loginBtn").innerText = "登录 / 注册";
  }
}

function skipLogin() { showApp(); }

function logout() {
  if (confirm("确定要退出登录吗？")) {
    _currentUser = null;
    localStorage.removeItem("sb_user");
    location.reload();
  }
}

function showApp() {
  document.getElementById("loginOverlay").style.display = "none";
  document.getElementById("appHeader").style.display = "block";
  document.getElementById("posBar").style.display = "flex";
  document.getElementById("dayBar").style.display = "flex";
  document.getElementById("mainContent").style.display = "block";
  if (_currentUser) {
    var name = _currentUser.email.split("@")[0];
    document.getElementById("userName").innerText = name;

function exportData() {
  var data = getData();

  var blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  var a = document.createElement("a");

  a.download = "足球打卡_数据_" + new Date().toISOString().slice(0, 10) + ".json";

function importData(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var imported = JSON.parse(ev.target.result);
      if (typeof imported !== "object" || imported === null) { showNotif("文件格式错误"); return; }
      var data = getData();
      var count = 0;
      for (var k in imported) { if (!data[k]) { data[k] = imported[k]; count++; } }
      saveData(data);
      render();
      showNotif("成功导入 " + count + " 条记录");
    } catch(e) { showNotif("文件解析失败"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function showNotif(msg) {

  var n = document.createElement("div"); n.className = "notification"; n.innerText = msg;
  document.body.appendChild(n);
  setTimeout(function() { n.style.opacity = "0"; n.style.transition = "opacity 0.3s"; setTimeout(function() { n.remove(); }, 300); }, 2000);
}
